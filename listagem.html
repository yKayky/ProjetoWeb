<html lang="pt-BR">

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="Imagens/logo.svg" height="40">
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="menu" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="cadastro.html">Cadastro</a></li>
        <li class="nav-item"><a class="nav-link active fw-bold" href="listagem.html">Produtos</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Produtos</h2>
    <a class="btn btn-dark" href="cadastro.html">+ Novo Produto</a>
  </div>

  <div class="table-responsive">
    <table class="table table-hover align-middle shadow-sm">
      <thead class="table-dark">
        <tr>
          <th>Imagem</th>
          <th>Produto</th>
          <th>Preço</th>
          <th>Status</th>
          <th class="text-center">Ações</th>
        </tr>
      </thead>

      <tbody>

        <tr>
          <td>
            <img src="https://images.tcdn.com.br/img/img_prod/1052037/camisa_barcelona_home_2024_25_vinho_5107_1_d341e920ec46adf8221fdfc56de512dc.jpg" class="rounded">
          </td>
          <td class="fw-semibold">Barcelona</td>
          <td class="text-success fw-bold">R$150</td>
          <td><span class="badge bg-success">Disponível</span></td>
          <td class="text-center">
            <button class="btn btn-sm btn-info" data-bs-toggle="modal" data-bs-target="#modal">Detalhes</button>
          </td>
        </tr>

        <tr>
          <td>
            <img src="https://acdn-us.mitiendanube.com/stores/002/322/390/products/camisa-do-brasil-azul-away1-f931ff93c1ec340a0c17652211085465-1024-1024.webp" class="rounded">
          </td>
          <td class="fw-semibold">Brasil</td>
          <td class="text-success fw-bold">R$130</td>
          <td><span class="badge bg-warning text-dark">Promoção</span></td>
          <td class="text-center">
            <button class="btn btn-sm btn-info" data-bs-toggle="modal" data-bs-target="#modal">Detalhes</button>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Detalhes do Produto</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img src="https://via.placeholder.com/200" class="mb-3 rounded">
        <p>Camisa oficial, tecido premium, disponível em todos os tamanhos.</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
