<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Camisa</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="Imagens/logo.svg" height="40">
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="menu" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active fw-bold" href="cadastro.html">Cadastro</a></li>
        <li class="nav-item"><a class="nav-link" href="listagem.html">Produtos</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTEÚDO -->
<div class="container mt-5 pt-5">

  <div class="mb-4">
    <h2 class="fw-bold">Cadastro de Camisa</h2>
    <p class="text-muted">Adicione uma nova camisa ao catálogo</p>
  </div>

  <div class="card shadow-sm p-4">
    <form>

      <div class="row">

        <div class="col-md-6 mb-3">
          <label class="form-label">Nome da Camisa</label>
          <input type="text" class="form-control" placeholder="Ex: Barcelona 23/24">
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Preço</label>
          <input type="number" class="form-control" placeholder="R$">
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Estoque</label>
          <input type="number" class="form-control" placeholder="Qtd">
        </div>

      </div>

      <div class="row">

        <div class="col-md-4 mb-3">
          <label class="form-label">Time</label>
          <select class="form-select">
            <option>Selecione...</option>
            <option>Barcelona</option>
            <option>Real Madrid</option>
            <option>Brasil</option>
            <option>São Paulo</option>
            <option>Santos</option>
            <option>PSG</option>
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Tamanho</label>
          <select class="form-select">
            <option>P</option>
            <option>M</option>
            <option>G</option>
            <option>GG</option>
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Status</label>
          <select class="form-select">
            <option>Disponível</option>
            <option>Promoção</option>
            <option>Indisponível</option>
          </select>
        </div>

      </div>

      <div class="mb-3">
        <label class="form-label">Imagem (URL)</label>
        <input type="text" class="form-control" placeholder="Cole o link da imagem">
      </div>

      <div class="mb-3">
        <label class="form-label">Descrição</label>
        <textarea class="form-control" rows="3" placeholder="Detalhes da camisa..."></textarea>
      </div>

      <!-- PREVIEW -->
      <div class="text-center mb-3">
        <img src="https://via.placeholder.com/150" class="rounded shadow-sm">
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button type="reset" class="btn btn-secondary">Cancelar</button>
        <button type="button" class="btn btn-success px-4" data-bs-toggle="modal" data-bs-target="#modal">
          Cadastrar Camisa
        </button>
      </div>

    </form>
  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Sucesso</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Camisa cadastrada com sucesso! ⚽🔥
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
