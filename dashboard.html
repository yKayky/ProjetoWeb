<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html"><img src="Imagens/logo.svg" alt=""></a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="menu" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="cadastro.html">Cadastro</a></li>
        <li class="nav-item"><a class="nav-link" href="listagem.html">Produtos</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTEÚDO -->
<div class="container mt-5 pt-5">

  <!-- TOPO -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Dashboard</h2>
    <span class="badge bg-dark">Atualizado agora</span>
  </div>

  <!-- CARDS -->
  <div class="row g-4">

    <div class="col-md-4">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h6 class="text-muted">Vendas</h6>
          <h3 class="fw-bold text-primary">120</h3>
          <p class="text-success mb-0">+12% este mês</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h6 class="text-muted">Clientes</h6>
          <h3 class="fw-bold text-success">85</h3>
          <p class="text-success mb-0">+5 novos</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h6 class="text-muted">Pedidos Pendentes</h6>
          <h3 class="fw-bold text-danger">10</h3>
          <p class="text-danger mb-0">Atenção necessária</p>
        </div>
      </div>
    </div>

  </div>

  <!-- PROGRESSO -->
  <div class="mt-5">
    <h5 class="mb-3">Meta de vendas</h5>

    <div class="progress" style="height: 25px;">
      <div class="progress-bar bg-success" style="width:70%">
        70%
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
